name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'
      - run: gradle build --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: autobow-jar
          path: build/libs/*.jar
